<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — TapeMath</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0E2A47;--yellow:#FFC400;--yellow-deep:#3D2E00;--steel:#9FB3C8;--line-blue:rgba(120,170,235,.22)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--navy);color:#EAF1F8;font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;display:grid;place-items:center;text-align:center;overflow:hidden;position:relative}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--line-blue) 1px,transparent 1px),linear-gradient(90deg,var(--line-blue) 1px,transparent 1px);
    background-size:46px 46px;mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 30%,transparent 80%);opacity:.7}
  .box{position:relative;z-index:2;padding:30px}
  .badge{width:46px;height:46px;border-radius:10px;margin:0 auto 26px;rotate:-4deg;
    background:linear-gradient(145deg,var(--yellow),#E0A800);display:grid;place-items:center;
    box-shadow:0 8px 20px rgba(255,196,0,.32),inset 0 1px 0 rgba(255,255,255,.5)}
  .badge span{font-family:'IBM Plex Mono';font-weight:600;font-size:16px;color:var(--yellow-deep)}
  .code{font-family:'Saira Condensed';font-weight:900;font-size:clamp(80px,18vw,150px);line-height:.9;
    color:#fff;letter-spacing:-2px}
  .code .y{color:var(--yellow)}
  .msg{font-family:'IBM Plex Mono';font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--steel);margin:8px 0 8px}
  h1{font-family:'Saira Condensed';font-weight:800;font-size:clamp(26px,5vw,40px);text-transform:uppercase;margin-bottom:14px}
  p{color:#B9CADB;max-width:380px;margin:0 auto 30px;font-size:15.5px}
  a.btn{font-family:'Saira Condensed';font-weight:800;font-size:16px;letter-spacing:.5px;text-transform:uppercase;
    background:linear-gradient(145deg,var(--yellow),#E8AE00);color:var(--yellow-deep);
    padding:14px 26px;border-radius:11px;text-decoration:none;display:inline-block;
    box-shadow:0 10px 28px rgba(255,196,0,.34),inset 0 1px 0 rgba(255,255,255,.6);transition:transform .2s}
  a.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <div class="badge"><span>?</span></div>
    <div class="code">4<span class="y">0</span>4</div>
    <div class="msg">Off the tape</div>
    <h1>This measurement<br>doesn't exist</h1>
    <p>The page you're looking for isn't here. Let's get you back to a square corner.</p>
    <a class="btn" href="/tapemath-site/">Back to TapeMath</a>
  </div>
</body>
</html>
